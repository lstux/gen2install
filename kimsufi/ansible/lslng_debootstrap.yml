---
- name: Debootstrap Gentoo on fresh server
  hosts: lslng.lslinux.org,
  become: false
  user: root

  vars:
    wipe_disks: true
    hostname: "lslng"
    disks:
      - "/dev/nvme0n1"
      - "/dev/nvme1n1"
    partitions:
      - { name: "efi",  size: "256MiB", type: "primary", fs_type: "vfat" } # Mandatory EFI partition
      - { name: "boot", size: "1GiB", type: "primary", fs_type: "ext2" }   # Mandatory boot partition
      - { name: "lvmpv", size: "100%", type: "primary", fs_type: "lvm" }   # Mandatory LVM PV partition
    lvm_vg: "gentoo_vg" # Volume group name for LVM
    lvm_lvs:
      - { name: "root", size: "20g", fs_type: "btrfs", mountpoint: "/" } # Mandatory root LV
      - { name: "home", size: "20g", fs_type: "btrfs", mountpoint: "/home" }
      - { name: "tmpdata", size: "20g", fs_type: "btrfs", mountpoint: "/tmpdata" }
    rootfs_mountpoint: "/mnt/gentoo"


  #var_files:
  #  - vars/common.yml
  #  - vars/lslng.yml

  roles:
    - role: disks_prepare
      state: present
      tags: [disks]
    - role: gentoo_stage3
      state: present
      tags: [stage3]
    - role: system_configuration
      state: present
      tags: [system]
    - role: bootloader
      state: present
      tags: [bootloader]
